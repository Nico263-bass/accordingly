<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html{
            font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        h1{
            text-transform: capitalize;
            text-align:center;
        }
        .main{
            width: 500px;
            height: 500px;
            background-color: darkcyan;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap:10px;
        }
        button{
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Learning deboging in Javascript</h1>
    <div class="main">
    <label for="input1">Enter Number 1:</label>
    <input type="number" id="input1"><br><br>
    <label for="input2">Enter Number 2:</label>
    <input type="number" id="input2"><br><br>
    <button onclick="performOperation()">Perform Operation</button>
    <p id="result">Result Ici</p>
    </div>
</body>
    <script>
        
            function performOperation(){
                
                
                        const input1=document.getElementById('input1').value.trim();
                        const input2=document.getElementById('input2').value.trim();
                        const num1=Number(input1);
                        const num2=Number(input2);
                        if (input1!=="" && input2!=="" && !Number.isNaN(num1)&& !Number.isNaN(num2)){
                            const resultat=multiply(num1,num2);
                            //déclaclaration de la fonction Multiply
                            function multiply(a,b){
                                return (a*b);
                            }
                            const result=document.getElementById('result');
                            result.innerHTML=resultat;
                            }
                        else {
                            alert('nombres entrés invalides')
                        }
                }
    
     </script>
</html>
